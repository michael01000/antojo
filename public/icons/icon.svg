<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E84C2E"/>
      <stop offset="55%" stop-color="#D9482A"/>
      <stop offset="100%" stop-color="#F0A830"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7FBF5E"/>
      <stop offset="100%" stop-color="#5FA84A"/>
    </linearGradient>
  </defs>
  <!-- Fondo redondeado -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- "a" estilizada de Antojo -->
  <text x="256" y="330" font-family="Arial, sans-serif" font-size="300" font-weight="900" text-anchor="middle" fill="white" letter-spacing="-20">a</text>
  <!-- Punto decorativo (mango) -->
  <circle cx="380" cy="132" r="34" fill="#F0A830"/>
  <circle cx="380" cy="132" r="34" fill="none" stroke="white" stroke-width="10"/>
  <!-- Hoja pequeña (lima - frescura/comida) -->
  <path d="M 96 376 Q 140 340 188 356 Q 172 400 128 412 Q 104 400 96 376 Z" fill="url(#leaf)"/>
  <path d="M 120 384 Q 150 372 178 374" stroke="white" stroke-width="4" fill="none" opacity="0.7"/>
</svg>
